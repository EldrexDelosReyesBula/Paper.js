<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Papyr App</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 90,28 90,72 50,95 10,72 10,28' fill='none' stroke='%236366f1' stroke-width='6'/%3E%3Cpath d='M35,30 L35,70' stroke='%236366f1' stroke-width='10' stroke-linecap='round'/%3E%3Cpath d='M35,30 C55,30 65,38 65,46 C65,54 55,58 35,58' fill='none' stroke='%2314b8a6' stroke-width='10' stroke-linecap='round'/%3E%3C/svg%3E">
    <!-- Papyr Complete CDN link - Zero download dependencies -->
    <script src="https://papyrus-js.vercel.app/papyr-complete.js"></script>
    <style>
        :root {
            --bg: #070913;
            --bg-card: rgba(16, 22, 42, 0.65);
            --border-glow: rgba(99, 102, 241, 0.2);
            --text-head: #ffffff;
            --text-main: #cbd5e1;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --teal: #14b8a6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Radial Glow */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, #4338ca 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, var(--primary-hover) 0%, #3730a3 100%);
        }
    </style>
</head>
<body>
    
    <!-- Mount Root Element -->
    <div id="app"></div>

    <script>
        // Custom starting code with Papyr.js state and computing
        let count = papyr.state(0);
        let double = papyr.computed(() => count.value * 2);

        let app = papyr.div(".card",
            papyr.h2("⚡ Welcome to Papyr!", { style: { margin: '0 0 0.5rem 0', color: '#fff' } }),
            papyr.p("Edit this HTML file directly to build high-performance, reactive pages without any bundlers or npm installs.", { style: { fontSize: '0.9rem', color: 'var(--text-muted)' } }),
            
            papyr.div({ style: { margin: '1.5rem 0', padding: '1rem', background: 'rgba(255,255,255,0.02)', borderRadius: '10px', border: '1px solid rgba(255,255,255,0.05)' } },
                papyr.p(() => "Clicks Count: " + count.value, { style: { fontSize: '1.2rem', fontWeight: 'bold', color: '#14b8a6', margin: '0' } }),
                papyr.p(() => "Double Count: " + double.value, { style: { fontSize: '0.9rem', color: '#a5b4fc', margin: '5px 0 0 0' } })
            ),
            
            papyr.button(".btn:Increment Reactive Value", {
                onclick: () => {
                    count.value++;
                    papyr.toast("Value incremented!", "success");
                }
            })
        );

        // Mount dynamic element to standard root container
        papyr.mount("#app", app);
    </script>
</body>
</html>
