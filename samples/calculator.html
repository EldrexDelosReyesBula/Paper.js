<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papyr Calculator - Creative Computing</title>
    
    <!-- Meta tags for premium SEO -->
    <meta name="description" content="A stunning glassmorphic, interactive scientific calculator built using the Papyr.js creative computing web runtime.">
    <meta name="keywords" content="papyr, calculator, modular, runtime, reactive, glassmorphism, responsive">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../papyr-complete.js"></script>
    <style>
        :root {
            --bg-color: #030712;
            --surface-color: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-secondary: #06b6d4;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Glassmorphic Panel Layout */
        .calculator-container {
            display: flex;
            gap: 24px;
            max-width: 800px;
            width: 90%;
            padding: 12px;
            box-sizing: border-size;
            flex-wrap: wrap;
            justify-content: center;
        }

        .calc-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 360px;
            padding: 24px;
            box-shadow: 
                0 20px 40px -15px rgba(0, 0, 0, 0.5),
                0 0 50px 0 var(--accent-glow);
            box-sizing: border-box;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .calc-card:hover {
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                0 0 60px 5px rgba(99, 102, 241, 0.25);
        }

        /* Screen Display */
        .calc-screen {
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 24px;
            text-align: right;
            box-sizing: border-box;
            height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .screen-history {
            color: var(--text-secondary);
            font-size: 0.95rem;
            min-height: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 300;
        }

        .screen-display {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -1px;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .screen-display::-webkit-scrollbar {
            height: 3px;
        }
        .screen-display::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Keypad Grid */
        .grid-pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 500;
            padding: 18px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        /* Operator Buttons */
        .btn-op {
            color: var(--accent-secondary);
            font-weight: 600;
            background: rgba(6, 182, 212, 0.05);
            border-color: rgba(6, 182, 212, 0.1);
        }
        .btn-op:hover {
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.3);
        }

        /* Action Buttons */
        .btn-action {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
            border-color: rgba(239, 68, 68, 0.1);
        }
        .btn-action:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Equal Button */
        .btn-equal {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            border: none;
            color: #ffffff;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .btn-equal:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            box-shadow: 0 6px 18px rgba(99, 102, 241, 0.5);
        }

        /* Side History Panel */
        .history-card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 280px;
            padding: 24px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            max-height: 480px;
        }

        .history-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 16px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .clear-history:hover {
            color: #ef4444;
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.9rem;
            text-align: right;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .item-expr {
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 4px;
        }

        .item-res {
            color: var(--accent-secondary);
            font-weight: 600;
        }

        .no-history {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 40px;
            font-style: italic;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Portal
    </a>

    <div id="app"></div>

    <script>
        const expression = papyr.state('');
        const displayValue = papyr.state('0');
        const historyLog = papyr.state([]);

        function appendChar(char) {
            if (expression.value === '' && ['+', '*', '/', '%'].includes(char)) return;
            expression.value += char;
            displayValue.value = expression.value;
        }

        function clearScreen() {
            expression.value = '';
            displayValue.value = '0';
        }

        function backspace() {
            expression.value = expression.value.slice(0, -1);
            displayValue.value = expression.value || '0';
        }

        function calculate() {
            if (expression.value === '') return;
            
            try {
                // Safe parsing formula using Basic Math engine
                const cleanExpr = expression.value.replace(/×/g, '*').replace(/÷/g, '/');
                
                // Solve equation curves and basic parsing
                const result = new Function(`return ${cleanExpr}`)();
                
                if (result === undefined || isNaN(result)) {
                    throw new Error("Invalid Format");
                }

                const resultStr = String(parseFloat(result.toFixed(8))); // handle float overflows

                // Log to history
                historyLog.value = [
                    { expr: expression.value, result: resultStr },
                    ...historyLog.value
                ];

                expression.value = resultStr;
                displayValue.value = resultStr;
            } catch(e) {
                displayValue.value = 'Error';
                expression.value = '';
            }
        }

        // Layout creation
        const app = papyr.div('.calculator-container',
            
            // Core calculator card
            papyr.div('.calc-card',
                // Display screen
                papyr.div('.calc-screen',
                    papyr.div('.screen-history', () => expression.value),
                    papyr.div('.screen-display', () => displayValue.value)
                ),

                // Button Keypad
                papyr.div('.grid-pad',
                    papyr.button('.calc-btn.btn-action:AC', { onclick: clearScreen }),
                    papyr.button('.calc-btn.btn-action:⌫', { onclick: backspace }),
                    papyr.button('.calc-btn.btn-op:(', { onclick: () => appendChar('(') }),
                    papyr.button('.calc-btn.btn-op:)', { onclick: () => appendChar(')') }),

                    papyr.button('.calc-btn.btn-op:÷', { onclick: () => appendChar('/') }),
                    papyr.button('.calc-btn:7', { onclick: () => appendChar('7') }),
                    papyr.button('.calc-btn:8', { onclick: () => appendChar('8') }),
                    papyr.button('.calc-btn:9', { onclick: () => appendChar('9') }),

                    papyr.button('.calc-btn.btn-op:×', { onclick: () => appendChar('*') }),
                    papyr.button('.calc-btn:4', { onclick: () => appendChar('4') }),
                    papyr.button('.calc-btn:5', { onclick: () => appendChar('5') }),
                    papyr.button('.calc-btn:6', { onclick: () => appendChar('6') }),

                    papyr.button('.calc-btn.btn-op:-', { onclick: () => appendChar('-') }),
                    papyr.button('.calc-btn:1', { onclick: () => appendChar('1') }),
                    papyr.button('.calc-btn:2', { onclick: () => appendChar('2') }),
                    papyr.button('.calc-btn:3', { onclick: () => appendChar('3') }),

                    papyr.button('.calc-btn.btn-op:+', { onclick: () => appendChar('+') }),
                    papyr.button('.calc-btn:0', { onclick: () => appendChar('0') }),
                    papyr.button('.calc-btn:.', { onclick: () => appendChar('.') }),
                    papyr.button('.calc-btn.btn-equal:=', { onclick: calculate })
                )
            ),

            // Side history logging drawer
            papyr.div('.history-card',
                papyr.h4('.history-header', 
                    papyr.span('History'),
                    papyr.span('.clear-history:Clear', {
                        onclick: () => historyLog.value = []
                    })
                ),
                papyr.div('.history-list',
                    papyr.if(() => historyLog.value.length === 0,
                        () => papyr.div('.no-history:No calculation history yet.'),
                        () => papyr.fragment(
                            papyr.for(historyLog, (item) => {
                                return papyr.div('.history-item', {
                                    onclick: () => {
                                        expression.value = item.expr;
                                        displayValue.value = item.result;
                                    }
                                },
                                    papyr.div('.item-expr', item.expr + ' ='),
                                    papyr.div('.item-res', item.result)
                                );
                            })
                        )
                    )
                )
            )
        );

        papyr.mount('#app', app);
    </script>
</body>
</html>
