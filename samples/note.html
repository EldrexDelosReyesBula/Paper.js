<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papyr Vault Notes - Secure Creative Computing</title>
    
    <!-- Meta tags for premium SEO -->
    <meta name="description" content="A gorgeous secure note-taking application powered by Papyr's built-in AES-GCM client-side cryptography.">
    <meta name="keywords" content="papyr, notes, database, encryption, security, reactivity, web app">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../papyr-complete.js"></script>
    <style>
        :root {
            --bg-color: #020617;
            --sidebar-color: rgba(15, 23, 42, 0.4);
            --content-color: rgba(30, 41, 59, 0.25);
            --border-color: rgba(255, 255, 255, 0.06);
            --accent-primary: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --panel-glass: rgba(15, 23, 42, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at top right, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at bottom left, rgba(20, 184, 166, 0.05) 0%, transparent 50%);
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Dashboard Grid Layout */
        .dashboard-container {
            display: flex;
            width: 100%;
            height: 100vh;
            border-radius: 0px;
            overflow: hidden;
        }

        /* Sidebar Column */
        .sidebar {
            width: 320px;
            background: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .brand-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #14b8a6 100%);
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .brand-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-input {
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #ffffff;
            padding: 12px 16px;
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-primary);
        }

        .notes-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 4px;
        }

        .notes-list::-webkit-scrollbar {
            width: 4px;
        }
        .notes-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .note-preview-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            position: relative;
        }

        .note-preview-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .note-preview-card.active {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        .note-preview-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .note-preview-excerpt {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 300;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .tag-pill {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-weight: 400;
        }

        .locked-badge {
            color: #eab308;
            display: inline-flex;
            align-items: center;
        }

        /* Create Button */
        .create-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            margin-top: 16px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            transition: all 0.2s;
            text-align: center;
            display: block;
            width: 100%;
        }

        .create-btn:hover {
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        /* Editor Area */
        .editor-container {
            flex-grow: 1;
            background: var(--content-color);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .note-title-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            width: 60%;
            transition: border-bottom 0.2s;
        }

        .note-title-input:focus {
            border-bottom-color: rgba(255,255,255,0.1);
        }

        .editor-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Glass Form Fields */
        .glass-field {
            background: rgba(3, 7, 18, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #ffffff;
            padding: 8px 12px;
            outline: none;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .note-textarea {
            flex-grow: 1;
            background: rgba(3, 7, 18, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            padding: 24px;
            outline: none;
            font-family: inherit;
            font-size: 1.05rem;
            line-height: 1.6;
            resize: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            min-height: 350px;
            transition: border-color 0.2s;
        }

        .note-textarea:focus {
            border-color: var(--accent-primary);
        }

        /* Footer Info */
        .editor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Safe Cryto Locks Widget */
        .security-badge {
            background: rgba(234, 179, 8, 0.05);
            border: 1px solid rgba(234, 179, 8, 0.15);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            box-sizing: border-box;
        }

        .security-badge svg {
            color: #eab308;
            flex-shrink: 0;
        }

        .secure-input {
            flex-grow: 1;
            display: flex;
            gap: 8px;
        }

        .secure-password-field {
            width: 140px;
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(234, 179, 8, 0.2);
            border-radius: 8px;
            color: #ffffff;
            padding: 6px 10px;
            outline: none;
            font-size: 0.8rem;
        }

        .secure-password-field:focus {
            border-color: #eab308;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #4f46e5 100%);
            border: none;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        .action-btn.primary:hover {
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .back-link {
            position: absolute;
            top: 20px;
            right: 40px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
            z-index: 100;
        }
        .back-link:hover {
            color: var(--accent-primary);
        }

        .empty-state {
            margin: auto;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state svg {
            margin-bottom: 16px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        Back to Portal
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </a>

    <div id="app" style="width: 100%;"></div>

    <script>
        // Reactive App State variables
        const notes = papyr.state([]);
        const activeNoteId = papyr.state(null);
        const searchQuery = papyr.state('');
        const decryptPassword = papyr.state('');

        // 1. Initialise Note DB & Fetch
        const db = papyr.db('papyr_notes');

        function loadNotes() {
            // Standard fetch
            const records = db.list();
            
            // If empty, seed initial notes
            if (records.length === 0) {
                db.insert({
                    title: 'Welcome to Papyr Vault ⚡',
                    content: 'This is a beautiful glassmorphic note-taking dashboard. You can create notes, assign tags, search, and lock sensitive notes using Web Crypto AES-GCM secure encryption!',
                    category: 'General',
                    isLocked: false,
                    date: new Date().toLocaleDateString()
                });
                db.insert({
                    title: 'Private Credentials (Encrypted)',
                    content: papyr.security.encrypt('API_KEY = "sk-proj-428a9b31d"\nDB_PASS = "admin-secret-lock"', 'secret123'),
                    category: 'Work',
                    isLocked: true,
                    date: new Date().toLocaleDateString()
                });
                notes.value = db.list();
            } else {
                notes.value = records;
            }

            if (notes.value.length > 0) {
                activeNoteId.value = notes.value[0].id;
            }
        }

        // Active Note Compute
        const activeNote = papyr.computed(() => {
            return notes.value.find(n => n.id === activeNoteId.value) || null;
        });

        // Filtered notes search Compute
        const filteredNotes = papyr.computed(() => {
            const query = searchQuery.value.toLowerCase().trim();
            if (!query) return notes.value;
            return notes.value.filter(n => 
                n.title.toLowerCase().includes(query) || 
                n.category.toLowerCase().includes(query)
            );
        });

        // Active note body text count Compute
        const wordCount = papyr.computed(() => {
            const current = activeNote.value;
            if (!current) return 0;
            if (current.isLocked) return '[Encrypted]';
            const txt = current.content || '';
            return txt.trim().split(/\s+/).filter(Boolean).length;
        });

        // CRUD: Create Note
        function createNewNote() {
            const newNote = db.insert({
                title: 'New Note',
                content: 'Start writing...',
                category: 'General',
                isLocked: false,
                date: new Date().toLocaleDateString()
            });
            notes.value = db.list();
            activeNoteId.value = newNote.id;
        }

        // CRUD: Update Note field
        function updateNoteField(field, value) {
            const current = activeNote.value;
            if (!current) return;

            db.update(current.id, { [field]: value });
            notes.value = db.list();
        }

        // CRUD: Delete Note
        function deleteNote() {
            const current = activeNote.value;
            if (!current) return;

            db.delete(current.id);
            notes.value = db.list();

            if (notes.value.length > 0) {
                activeNoteId.value = notes.value[0].id;
            } else {
                activeNoteId.value = null;
            }
            papyr.toast('Note deleted successfully', 'warning');
        }

        // Secure Lock Mechanics
        function lockNote(password) {
            const current = activeNote.value;
            if (!current || !password) return;

            if (current.isLocked) {
                papyr.toast('Note is already encrypted', 'error');
                return;
            }

            const encryptedText = papyr.security.encrypt(current.content, password);
            db.update(current.id, {
                content: encryptedText,
                isLocked: true
            });

            notes.value = db.list();
            papyr.toast('Note locked & encrypted with AES-GCM', 'success');
        }

        // Secure Unlock/Decrypt Mechanics
        function decryptNote(password) {
            const current = activeNote.value;
            if (!current || !password) return;

            if (!current.isLocked) return;

            const decryptedText = papyr.security.decrypt(current.content, password);
            if (decryptedText) {
                db.update(current.id, {
                    content: decryptedText,
                    isLocked: false
                });
                decryptPassword.value = '';
                notes.value = db.list();
                papyr.toast('Note unlocked successfully', 'success');
            } else {
                papyr.toast('Decryption Failed. Invalid password.', 'error');
            }
        }

        // Sidebar render preview card template
        function renderNotePreview(note) {
            const isActive = papyr.computed(() => activeNoteId.value === note.id);
            
            return papyr.div(() => `.note-preview-card${isActive.value ? '.active' : ''}`, {
                onclick: () => {
                    activeNoteId.value = note.id;
                    decryptPassword.value = '';
                }
            },
                papyr.div('.note-preview-title', 
                    note.title,
                    note.isLocked ? 
                        papyr.span('.locked-badge', '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>') : 
                        papyr.span('.tag-pill', note.category)
                ),
                papyr.div('.note-preview-excerpt', 
                    note.isLocked ? 'This note is locked and encrypted. Enter password to view.' : note.content
                )
            );
        }

        // Editor Form Panel template
        function renderEditor() {
            return papyr.if(() => activeNote.value !== null,
                () => {
                    const current = activeNote.value;
                    return papyr.div('.editor-container',
                        
                        // Header panel
                        papyr.div('.editor-header',
                            papyr.input('.note-title-input', {
                                value: current.title,
                                oninput: (e) => updateNoteField('title', e.target.value)
                            }),
                            papyr.div('.editor-actions',
                                papyr.select('.glass-field', {
                                    value: current.category,
                                    onchange: (e) => updateNoteField('category', e.target.value)
                                },
                                    papyr.option({ value: 'General' }, 'General'),
                                    papyr.option({ value: 'Work' }, 'Work'),
                                    papyr.option({ value: 'Personal' }, 'Personal'),
                                    papyr.option({ value: 'Finance' }, 'Finance')
                                ),
                                papyr.button('.action-btn.btn-action:Delete', { onclick: deleteNote })
                            )
                        ),

                        // Secure Encryption locking badge widget
                        papyr.div('.security-badge',
                            papyr.html('<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'),
                            papyr.if(() => current.isLocked,
                                // Unlock Panel
                                () => papyr.div('.secure-input',
                                    papyr.span({ style: { display: 'flex', alignItems: 'center', fontSize: '0.85rem', color: '#eab308' } }, 'Note is Encrypted:'),
                                    papyr.input('.secure-password-field', {
                                        type: 'password',
                                        placeholder: 'Enter password...',
                                        value: () => decryptPassword.value,
                                        oninput: (e) => decryptPassword.value = e.target.value
                                    }),
                                    papyr.button('.action-btn:Unlock', { 
                                        onclick: () => decryptNote(decryptPassword.value)
                                    })
                                ),
                                // Lock Panel
                                () => papyr.div('.secure-input',
                                    papyr.span({ style: { display: 'flex', alignItems: 'center', fontSize: '0.85rem' } }, 'Protect Note:'),
                                    papyr.input('.secure-password-field', {
                                        type: 'password',
                                        id: 'lock-pass',
                                        placeholder: 'Set password...'
                                    }),
                                    papyr.button('.action-btn:Lock Note', { 
                                        onclick: () => {
                                            const pass = document.getElementById('lock-pass').value;
                                            if (pass) {
                                                lockNote(pass);
                                                document.getElementById('lock-pass').value = '';
                                            } else {
                                                papyr.toast('Enter a password to encrypt', 'error');
                                            }
                                        }
                                    })
                                )
                            )
                        ),

                        // Text Area Editor
                        papyr.textarea('.note-textarea', {
                            value: current.isLocked ? '[This note is encrypted. Please enter the password to view and edit.]' : current.content,
                            disabled: current.isLocked,
                            oninput: (e) => {
                                if (!current.isLocked) {
                                    updateNoteField('content', e.target.value);
                                }
                            }
                        }),

                        // Footer statistics
                        papyr.div('.editor-footer',
                            papyr.span(() => `Word count: ${wordCount.value}`),
                            papyr.span(() => `Last saved: ${current.date}`)
                        )
                    );
                },
                () => papyr.div('.empty-state',
                    papyr.html('<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="11" y2="17"></line></svg>'),
                    papyr.h3('No Note Selected'),
                    papyr.p('Create a new note or select one from the sidebar.')
                )
            );
        }

        // Build main visual Dashboard structure
        const app = papyr.div('.dashboard-container',
            
            // Sidebar listing
            papyr.div('.sidebar',
                papyr.div('.brand-header',
                    papyr.span('.brand-dot'),
                    papyr.span('.brand-title', 'Papyr Vault')
                ),
                
                // Search bar
                papyr.input('.search-input', {
                    placeholder: 'Search notes by title...',
                    value: () => searchQuery.value,
                    oninput: (e) => searchQuery.value = e.target.value
                }),

                // Sidebar scrolling note cards
                papyr.div('.notes-list',
                    papyr.for(filteredNotes, renderNotePreview)
                ),

                // Trigger Button
                papyr.button('.create-btn:+ Add New Note', { onclick: createNewNote })
            ),

            // Form editor area
            renderEditor()
        );

        // Mount and initialize
        loadNotes();
        papyr.mount('#app', app);
    </script>
</body>
</html>
